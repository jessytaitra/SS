<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📦 股東紀念品管理系統</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3354;
    --accent: #6c8dfa;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', 'PingFang TC', sans-serif; font-size: 15px; min-height: 100vh; }
  
  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.5); }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .header-top h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); margin-left: auto; flex-shrink: 0; }
  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  
  /* Controls */
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 150px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 14px; outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }
  .btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #5a7df0; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-outline.active { border-color: var(--accent); color: var(--accent); background: rgba(108,141,250,.1); }
  
  /* Filter bar */
  .filter-bar { padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text2); white-space: nowrap; transition: all .15s; }
  .filter-chip:hover, .filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(108,141,250,.12); }
  .filter-chip.person-chip { border-color: var(--accent2); color: var(--accent2); }
  .filter-chip.person-chip.active { background: rgba(167,139,250,.15); }
  
  /* Stats bar */
  .stats-bar { padding: 8px 16px; display: flex; gap: 12px; overflow-x: auto; background: var(--surface2); border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-item { display: flex; flex-direction: column; align-items: center; min-width: fit-content; }
  .stat-num { font-size: 19px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .stat-sep { width: 1px; background: var(--border); flex-shrink: 0; }
  
  /* Table container */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  th { background: var(--surface); color: var(--text2); font-size: 12px; font-weight: 600; padding: 10px 8px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); white-space: nowrap; user-select: none; cursor: pointer; }
  th:hover { color: var(--accent); }
  th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  td { padding: 8px 8px; border-bottom: 1px solid rgba(46,51,84,.5); vertical-align: middle; }
  tr:hover td { background: rgba(108,141,250,.05); }
  
  /* Person checkboxes */
  .person-cells { display: flex; gap: 4px; }
  .p-check { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: all .15s; border: 1.5px solid var(--border); background: var(--surface2); flex-shrink: 0; }
  .p-check:hover { border-color: var(--green); }
  .p-check.checked { background: rgba(52,211,153,.15); border-color: var(--green); }
  .p-check.has-stock { border-color: var(--accent2); }
  .p-check.checked.has-stock { background: rgba(52,211,153,.2); border-color: var(--green); }
  .p-check.no-stock { opacity: .2; cursor: default; }
  
  /* Badges */
  .stock-code { font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px; color: var(--accent2); background: rgba(167,139,250,.1); padding: 2px 6px; border-radius: 4px; }
  .stock-name { font-weight: 600; font-size: 14px; }
  .gift-text { font-size: 13px; color: var(--text2); max-width: 200px; }
  .date-text { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .pickup-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: rgba(251,191,36,.12); color: var(--yellow); border: 1px solid rgba(251,191,36,.3); white-space: nowrap; }
  .holders-badge { font-size: 13px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .holders-6 { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.3); }
  .holders-5 { background: rgba(251,191,36,.12); color: var(--yellow); border: 1px solid rgba(251,191,36,.3); }
  .holders-low { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
  
  /* Registrar */
  .registrar-text { font-size: 12px; color: var(--text3); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .edit-hint { font-size: 12px; color: var(--text3); font-style: italic; white-space: nowrap; }
  td[ondblclick] { cursor: text; }
  td[ondblclick]:hover { background: rgba(108,141,250,.08); }
  
  /* Progress */
  .progress-cell { min-width: 80px; }
  .progress-bar { height: 4px; border-radius: 2px; background: var(--surface2); overflow: hidden; margin-top: 3px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }
  .progress-text { font-size: 11px; color: var(--text3); }
  
  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: flex-end; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 16px 32px; width: 100%; max-height: 85vh; overflow-y: auto; animation: slideUp .25s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .modal-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .modal-section { margin-bottom: 14px; }
  .modal-label { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .modal-value { font-size: 14px; color: var(--text); }
  .modal-persons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .modal-person { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 8px; background: var(--surface2); border: 1.5px solid var(--border); cursor: pointer; transition: all .15s; }
  .modal-person.checked { border-color: var(--green); background: rgba(52,211,153,.1); }
  .modal-person.no-stock { opacity: .3; cursor: default; pointer-events: none; }
  .modal-person-name { font-size: 14px; font-weight: 600; }
  .modal-person-icon { font-size: 17px; }
  
  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 14px; z-index: 300; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .offline-mode .editable-cell, .offline-mode .p-check.has-stock { opacity: .55; cursor: not-allowed !important; }
  
  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  
  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 49px; margin-bottom: 12px; }
  
  /* Offline banner */
  .offline-banner { background: rgba(248,113,113,.15); border-bottom: 1px solid rgba(248,113,113,.3); padding: 8px 16px; text-align: center; font-size: 13px; color: var(--red); display: none; }
  .offline-banner.show { display: block; }
  
  /* SQL Modal */
  .sql-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 300; overflow-y: auto; padding: 20px 16px; }
  .sql-modal.open { display: block; }
  .sql-box { background: var(--surface); border-radius: var(--radius); padding: 16px; max-width: 700px; margin: 0 auto; }
  .sql-box h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 11px; overflow-x: auto; color: var(--text2); line-height: 1.6; }
  .sql-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 13px; color: var(--text); cursor: pointer; margin-top: 12px; width: 100%; }
  .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 65vh; overflow-y: auto; }
  .history-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .history-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .history-meta { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .history-change { font-size: 13px; color: var(--text2); line-height: 1.45; word-break: break-word; }
  .history-empty { text-align: center; color: var(--text3); padding: 40px 12px; }
  
  /* Person label colors */
  .p-guan { color: #60a5fa; }
  .p-mi { color: #f472b6; }
  .p-jie { color: #a78bfa; }
  .p-jing { color: #34d399; }
  .p-sheng { color: #fb923c; }
  .p-hao { color: #fbbf24; }
  .p-ba { color: #facc15; }
</style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">📵 離線模式 — 目前禁止修改，避免誤以為已存入資料庫</div>

<div class="header">
  <div class="header-top">
    <h1>📦 股東紀念品管理</h1>
    <span style="font-size: 12px;color:var(--text3)">福邦7人版</span>
    <div class="status-dot" id="statusDot"></div>
  </div>
  <div class="controls">
    <input class="search-box" id="searchBox" type="search" placeholder="🔍 搜尋股票名稱、代碼、紀念品..." autocomplete="off">
    <button class="btn btn-outline" onclick="openHistoryModal()">🕘 歷程</button>
    <button class="btn btn-outline" id="syncBtn" onclick="syncData()">🔄</button>
    <button class="btn btn-outline" id="retryBtn" onclick="retryPendingWrites()">🔁 重新同步</button>
    <button class="btn btn-outline" onclick="exportExcel()">⬇️ Excel</button>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">全部</button>
  <button class="filter-chip person-chip" data-filter="ba" onclick="setFilter('ba',this)">⭐ 爸</button>
  <button class="filter-chip person-chip" data-filter="jie" onclick="setFilter('jie',this)">💜 婕</button>
  <button class="filter-chip person-chip" data-filter="mi" onclick="setFilter('mi',this)">🌸 咪</button>
  <button class="filter-chip person-chip" data-filter="sheng" onclick="setFilter('sheng',this)">🟠 昇</button>
  <button class="filter-chip person-chip" data-filter="hao" onclick="setFilter('hao',this)">☀️ 昊</button>
  <button class="filter-chip person-chip" data-filter="jing" onclick="setFilter('jing',this)">💚 菁</button>
  <button class="filter-chip person-chip" data-filter="guan" onclick="setFilter('guan',this)">🔵 亘</button>

  <button class="filter-chip" data-filter="pending" onclick="setFilter('pending',this)">⏳ 未全領</button>
  <button class="filter-chip" data-filter="done" onclick="setFilter('done',this)">✅ 全部領完</button>
  <button class="filter-chip" data-filter="pickup" onclick="setFilter('pickup',this)">📅 有領取時間</button>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-item"><span class="stat-num" id="st-total">-</span><span class="stat-label">總筆數</span></div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num" id="st-showing">-</span><span class="stat-label">顯示</span></div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num" id="st-done">-</span><span class="stat-label">已全領</span></div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num p-ba" id="st-ba">-</span><span class="stat-label">爸待領</span></div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num p-jie" id="st-jie">-</span><span class="stat-label">婕待領</span></div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num p-mi" id="st-mi">-</span><span class="stat-label">咪待領</span></div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num p-sheng" id="st-sheng">-</span><span class="stat-label">昇待領</span></div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num p-hao" id="st-hao">-</span><span class="stat-label">昊待領</span></div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num p-jing" id="st-jing">-</span><span class="stat-label">菁待領</span></div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num p-guan" id="st-guan">-</span><span class="stat-label">亘待領</span></div>
</div>

<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="table-wrap" id="tableWrap" style="display:none">
  <table id="mainTable">
    <thead>
      <tr>
        <th onclick="sortBy('stock_code', event)">代碼</th>
        <th onclick="sortBy('stock_name', event)">名稱</th>
        <th>人名</th>
        <th onclick="sortBy('holders', event)">人數</th>
        <th onclick="sortBy('agm_date', event)">股東會</th>
        <th onclick="sortBy('pickup_time', event)">領取時間</th>
        <th>紀念品</th>
        <th>股代</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">🔍</div>
    <div>找不到符合的記錄</div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-subtitle" id="mSubtitle"></div>
    <div class="modal-section">
      <div class="modal-label">紀念品</div>
      <div class="modal-value" id="mGift"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">領取時間</div>
      <div class="modal-value" id="mPickup"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">股代 / 地址</div>
      <div class="modal-value" id="mRegistrar"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">點擊切換領取狀態</div>
      <div class="modal-persons" id="mPersons"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- History Modal -->
<div class="sql-modal" id="historyModal">
  <div class="sql-box">
    <h2>🕘 修改歷程</h2>
    <p style="font-size: 13px;color:var(--text2);margin-bottom:12px">顯示本機操作，以及頁面同步時偵測到的其他裝置修改。</p>
    <div class="history-list" id="historyContent"></div>
    <button class="sql-close" onclick="clearHistory()">清除本機歷程</button>
    <button class="sql-close" onclick="closeHistoryModal()" style="margin-top:8px">關閉</button>
  </div>
</div>

<!-- Failed Sync Modal -->
<div class="sql-modal" id="pendingModal">
  <div class="sql-box">
    <h2>⚠️ 寫入失敗清單</h2>
    <p style="font-size: 13px;color:var(--text2);margin-bottom:12px">以下修改尚未寫入 Supabase。請確認網路恢復後，按「重新同步本機修改」。</p>
    <div class="history-list" id="pendingContent"></div>
    <button class="sql-close" onclick="retryPendingWrites()">🔁 重新同步本機修改</button>
    <button class="sql-close" onclick="closePendingModal()" style="margin-top:8px">關閉</button>
  </div>
</div>

<script>

const SUPABASE_URL = 'https://sippzngyuszavmkpzrno.supabase.co';

const TABLE = 'shareholder_gifts';

const PERSON_LABELS = {ba:'爸',jie:'婕',mi:'咪',sheng:'昇',hao:'昊',jing:'菁',guan:'亘'};
const PERSON_ICONS = {ba:'⭐',jie:'💜',mi:'🌸',sheng:'🟠',hao:'☀️',jing:'💚',guan:'🔵'};

function normalizeRows(rows) {
  return (rows || []).map(r => {
    const row = {...r};
    const jingHas = row.has_jing !== undefined ? row.has_jing : !!row.jing;
    if (row.has_hao === undefined && row.hao === undefined) row.has_hao = jingHas;
    if (row.hao === undefined) row.hao = row.has_hao;
    if (row.collected_hao === undefined) row.collected_hao = !!row.collected_jing;
    row.holders = PERSONS.filter(p => row['has_' + p] !== undefined ? row['has_' + p] : !!row[p]).length;
    return row;
  });
}

// ====== SUPABASE API ======
async function sbFetch(path, opts = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
    ...opts.headers
  };
  return fetch(url, { ...opts, headers });
}

async function fetchData() {
  try {
    const res = await sbFetch(`${TABLE}?select=*&order=id.asc&limit=1000`);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (data && data.length > 0) {
      allData = normalizeRows(data);
      saveCache(allData);
      setOnline(true);
      return data;
    }
    // table empty — seed it
    await seedData();
    return allData;
  } catch(e) {
    console.warn('Supabase unavailable, using cache', e);
    setOnline(false);
    const cached = loadCache();
    if (cached) { allData = normalizeRows(cached); return allData; }
    allData = normalizeRows(SEED_DATA.map(r => ({...r, collected_ba:false, collected_jie:false, collected_mi:false, collected_sheng:false, collected_hao:false, collected_jing:false, collected_guan:false})));
    return allData;
  }
}

async function seedData() {
  try {
    const rows = SEED_DATA.map(r => ({
      id: r.id,
      stock_code: r.stock_code,
      stock_name: r.stock_name,
      has_ba: r.ba, has_jie: r.jie, has_mi: r.mi,
      has_sheng: r.sheng, has_hao: r.hao, has_jing: r.jing, has_guan: r.guan,
      holders: r.holders,
      etd_last_day: r.etd_last_day,
      agm_date: r.agm_date,
      pickup_time: r.pickup_time,
      registrar: r.registrar,
      registrar_address: r.registrar_address,
      gift: r.gift,
      collected_ba: false, collected_jie: false, collected_mi: false,
      collected_sheng: false, collected_hao: false, collected_jing: false, collected_guan: false
    }));
    const batchSize = 50;
    for (let i=0; i<rows.length; i+=batchSize) {
      const batch = rows.slice(i, i+batchSize);
      await sbFetch(TABLE, { method:'POST', body: JSON.stringify(batch) });
    }
    // re-fetch
    const res = await sbFetch(`${TABLE}?select=*&order=id.asc&limit=1000`);
    const data = await res.json();
    allData = normalizeRows(data);
    saveCache(allData);
  } catch(e) { console.error('seed failed', e); }
}

async function updateRecord(id, field, value) {
  const idx = allData.findIndex(r => r.id === id);
  if (idx < 0) return;
  const row = allData[idx];
  const oldValue = row[field] || '';
  if (String(oldValue) === String(value)) return;

  if (!canWriteNow()) {
    showToast('⛔ 離線時禁止修改');
    return;
  }

  const patch = {};
  patch[field] = value;
  try {
    const res = await sbFetch(`${TABLE}?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify(patch)
    });
    if (!res.ok) throw new Error(await res.text());

    addHistory({ row, field, oldValue, newValue: value, source: '本機' });
    allData[idx][field] = value;
    saveCache(allData);
    renderTable();
    updateStats();
    if (currentRowId === id) {
      const currentRow = allData.find(r => r.id === id);
      if (currentRow) {
        document.getElementById('mPickup').textContent = currentRow.pickup_time && currentRow.pickup_time !== 'nan' ? currentRow.pickup_time : '（未填寫）';
        document.getElementById('mGift').textContent = currentRow.gift || '—';
        document.getElementById('mRegistrar').textContent = [currentRow.registrar, currentRow.registrar_address].filter(Boolean).join('｜') || '—';
      }
    }
    showToast('✅ 已寫入資料庫');
  } catch(e) {
    console.error('write failed', e);
    addPendingWrite({
      type: 'field', id, stock_code: row.stock_code || '', stock_name: row.stock_name || '',
      field, label: fieldLabel(field), oldValue, newValue: value, patch
    });
    setOnline(false);
    showToast('❌ 寫入失敗');
    openPendingModal();
  }
}

// ====== REALTIME ======
function setupRealtime() {
  if (typeof WebSocket === 'undefined') return;
  // Simple polling fallback for realtime
  setInterval(async () => {
    if (!isOnline) return;
    try {
      const res = await sbFetch(`${TABLE}?select=*&order=id.asc&limit=1000`);
      if (!res.ok) return;
      const data = await res.json();
      const normalizedData = normalizeRows(data);
      const statusHash = rows => JSON.stringify(rows.map(r => ({
        id: r.id,
        pickup_time: r.pickup_time || '',
        gift: r.gift || '',
        registrar: r.registrar || '',
        registrar_address: r.registrar_address || '',
        ...Object.fromEntries(PERSONS.flatMap(p => [
          ['has_' + p, !!(r['has_' + p] !== undefined ? r['has_' + p] : r[p])],
          ['collected_' + p, !!r['collected_' + p]]
        ]))
      })));
      const newHash = statusHash(normalizedData);
      const oldHash = statusHash(allData);
      if (newHash !== oldHash) {
        addDiffHistory(allData, normalizedData, '其他裝置');
        allData = normalizedData;
        saveCache(allData);
        renderTable();
        updateStats();
      }
    } catch(e) {}
  }, 8000);
}

// ====== CACHE ======
function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts: Date.now(), data})); } catch(e){}
}
function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const {data} = JSON.parse(raw);
    return data;
  } catch(e) { return null; }
}


// ====== PENDING WRITES ======
function loadPendingWrites() {
  try { return JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); } catch(e) { return []; }
}
function savePendingWrites(items) {
  try { localStorage.setItem(PENDING_KEY, JSON.stringify(items || [])); } catch(e) {}
  updatePendingButton();
}
function addPendingWrite(item) {
  const items = loadPendingWrites();
  items.unshift({ ...item, ts: new Date().toISOString() });
  savePendingWrites(items);
}
function updatePendingButton() {
  const btn = document.getElementById('retryBtn');
  if (!btn) return;
  const count = loadPendingWrites().length;
  btn.textContent = count ? `🔁 重新同步(${count})` : '🔁 重新同步';
  btn.classList.toggle('active', count > 0);
}
function canWriteNow() {
  return isOnline && navigator.onLine;
}
function renderPendingWrites() {
  const box = document.getElementById('pendingContent');
  if (!box) return;
  const items = loadPendingWrites();
  if (!items.length) {
    box.innerHTML = '<div class="history-empty">目前沒有寫入失敗項目</div>';
    return;
  }
  box.innerHTML = items.map(item => {
    const dt = new Date(item.ts);
    const time = isNaN(dt.getTime()) ? item.ts : dt.toLocaleString('zh-TW', { hour12: false });
    return `<div class="history-item">
      <div class="history-title">${escapeHtml(item.stock_code)} ${escapeHtml(item.stock_name)}</div>
      <div class="history-meta">${escapeHtml(time)}｜${escapeHtml(item.label || item.field)}</div>
      <div class="history-change">${escapeHtml(displayValue(item.oldValue))} → ${escapeHtml(displayValue(item.newValue))}</div>
    </div>`;
  }).join('');
}
function openPendingModal() {
  renderPendingWrites();
  const el = document.getElementById('pendingModal');
  if (el) el.classList.add('open');
}
function closePendingModal() {
  const el = document.getElementById('pendingModal');
  if (el) el.classList.remove('open');
}
async function retryPendingWrites() {
  const items = loadPendingWrites();
  if (!items.length) {
    showToast('✅ 沒有需要重新同步的修改');
    return;
  }
  if (!navigator.onLine) {
    setOnline(false);
    showToast('⛔ 目前離線，無法重新同步');
    openPendingModal();
    return;
  }

  const remain = [];
  let okCount = 0;
  for (const item of items.slice().reverse()) {
    try {
      const res = await sbFetch(`${TABLE}?id=eq.${item.id}`, {
        method: 'PATCH',
        body: JSON.stringify(item.patch || {})
      });
      if (!res.ok) throw new Error(await res.text());

      const idx = allData.findIndex(r => String(r.id) === String(item.id));
      if (idx >= 0) {
        const row = allData[idx];
        Object.assign(row, item.patch || {});
        addHistory({
          row,
          field: item.field,
          oldValue: item.oldValue,
          newValue: item.newValue,
          source: '重新同步'
        });
      }
      okCount++;
    } catch(e) {
      console.error('retry failed', e);
      remain.unshift(item);
    }
  }

  savePendingWrites(remain);
  saveCache(allData);
  renderTable();
  updateStats();
  setOnline(remain.length === 0);
  renderPendingWrites();
  if (remain.length) {
    showToast(`❌ 寫入失敗：尚有 ${remain.length} 筆`);
    openPendingModal();
  } else {
    closePendingModal();
    showToast(`✅ 已寫入資料庫：${okCount} 筆`);
  }
}

// ====== UI HELPERS ======
function setOnline(v) {
  isOnline = v;
  document.getElementById('statusDot').className = 'status-dot' + (v ? ' online' : '');
  document.getElementById('offlineBanner').className = 'offline-banner' + (v ? '' : ' show');
  document.body.classList.toggle('offline-mode', !v);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function getField(row, person, type) {
  if (type === 'has') return row['has_' + person] || row[person] || false;
  return row['collected_' + person] || false;
}

function rowPersons(row) {
  return PERSONS.filter(p => getField(row, p, 'has'));
}

function isStockCollected(row) {
  return rowPersons(row).some(p => getField(row, p, 'col'));
}

function isStockPending(row) {
  return rowPersons(row).length > 0 && !isStockCollected(row);
}

function parseDateKey(value) {
  const text = String(value || '').trim();
  if (!text || text === 'nan' || text.includes('未公布') || text.includes('股東會')) {
    return { missing: true, key: 99999999 };
  }
  let m = text.match(/(\d{3})[\/\-.年]?(\d{1,2})[\/\-.月]?(\d{1,2})/);
  if (m) return { missing: false, key: Number(m[1]) * 10000 + Number(m[2]) * 100 + Number(m[3]) };
  m = text.match(/(\d{1,2})月(\d{1,2})日/);
  if (m) return { missing: false, key: 1150000 + Number(m[1]) * 100 + Number(m[2]) };
  return { missing: true, key: 99999999 };
}

function compareRows(a, b, col) {
  if (['pickup_time', 'agm_date', 'etd_last_day'].includes(col)) {
    const da = parseDateKey(a[col]);
    const db = parseDateKey(b[col]);
    if (da.missing !== db.missing) return da.missing ? 1 : -1;
    return (da.key - db.key) * sortDir;
  }
  if (col === 'holders') return ((Number(a[col]) || 0) - (Number(b[col]) || 0)) * sortDir;
  const va = a[col] || '', vb = b[col] || '';
  return String(va).localeCompare(String(vb), 'zh-TW', { numeric: true }) * sortDir;
}

// ====== FILTER / SORT ======
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilterSort();
}

function applyFilterSort() {
  let data = [...allData];
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  
  if (q) {
    data = data.filter(r =>
      (r.stock_name||'').toLowerCase().includes(q) ||
      (r.stock_code||'').toLowerCase().includes(q) ||
      (r.gift||'').toLowerCase().includes(q) ||
      (r.registrar||'').toLowerCase().includes(q)
    );
  }
  
  if (currentFilter === 'pending') {
    data = data.filter(r => isStockPending(r));
  } else if (currentFilter === 'done') {
    data = data.filter(r => isStockCollected(r));
  } else if (currentFilter === 'pickup') {
    data = data.filter(r => r.pickup_time && r.pickup_time.trim());
  } else if (PERSONS.includes(currentFilter)) {
    const p = currentFilter;
    data = data.filter(r => getField(r,p,'has'));
  }
  
  if (sortCol) {
    data.sort((a,b) => compareRows(a, b, sortCol));
  }
  
  displayData = data;
  renderTable();
  updateStats();
}

function sortBy(col, ev) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => th.className = '');
  if (ev && ev.target) ev.target.className = sortDir === 1 ? 'sort-asc' : 'sort-desc';
  applyFilterSort();
}

// ====== RENDER ======
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

function editableCell(row, field, label, className = '') {
  const raw = row[field];
  const value = raw && String(raw).trim() && raw !== 'nan' ? String(raw) : '';
  const shown = value || '—';
  const cls = className ? ` class="${className} editable-cell"` : ' class="editable-cell"';
  return `<span${cls} title="點一下修改：${escapeHtml(value || label)}">${escapeHtml(shown)}</span>`;
}

function openEditPrompt(e, id, field, label) {
  e.stopPropagation();
  if (!canWriteNow()) {
    showToast('⛔ 離線時禁止修改');
    return;
  }
  const row = allData.find(r => r.id === id);
  if (!row) return;
  const current = row[field] && row[field] !== 'nan' ? row[field] : '';
  const next = prompt(`修改${label}`, current);
  if (next === null) return;
  updateRecord(id, field, next.trim());
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  
  if (displayData.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  const html = displayData.map(row => {
    const allDone = isStockCollected(row);
    const rowClass = allDone ? 'style="opacity:.6"' : '';
    
    const persons = PERSONS.map(p => {
      const has = getField(row,p,'has');
      const col = isStockCollected(row);
      if (!has) return `<div class="p-check no-stock" title="${PERSON_LABELS[p]}">·</div>`;
      return `<div class="p-check has-stock ${col?'checked':''}" 
        onclick="togglePerson(event,${row.id},'${p}')"
        title="${PERSON_LABELS[p]}">${col?'✓':PERSON_ICONS[p]}</div>`;
    }).join('');
    
    const totalHas = rowPersons(row).length;
    const totalCol = isStockCollected(row) ? totalHas : 0;
    const pct = totalHas > 0 ? Math.round(totalCol/totalHas*100) : 0;
    const holderClass = totalHas >= 6 ? 'holders-6' : totalHas >= 5 ? 'holders-5' : 'holders-low';
    
    const pickup = editableCell(row, 'pickup_time', '領取時間', 'date-text');
    const gift = editableCell(row, 'gift', '紀念品', 'gift-text');
    const registrar = editableCell(row, 'registrar', '股代', 'registrar-text');
    
    return `<tr ${rowClass} onclick="openModal(${row.id})" style="cursor:pointer">
      <td><span class="stock-code">${row.stock_code||'-'}</span></td>
      <td><div class="stock-name">${row.stock_name||''}</div></td>
      <td onclick="event.stopPropagation()"><div class="person-cells">${persons}</div>
        <div class="progress-cell"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'var(--green)':pct>50?'var(--yellow)':'var(--accent)'}"></div></div>
        <div class="progress-text">${isStockCollected(row) ? '已領取' : '未領取'}</div></div>
      </td>
      <td><span class="holders-badge ${holderClass}">${totalHas}</span></td>
      <td><div class="date-text">${row.agm_date||'-'}</div></td>
      <td class="editable-td" onclick="openEditPrompt(event,${row.id},'pickup_time','領取時間')">${pickup}</td>
      <td class="editable-td" onclick="openEditPrompt(event,${row.id},'gift','紀念品')">${gift}</td>
      <td class="editable-td" onclick="openEditPrompt(event,${row.id},'registrar','股代')">${registrar}</td>
    </tr>`;
  }).join('');
  
  tbody.innerHTML = html;
}

async function updateCollectedForStock(id, value) {
  const idx = allData.findIndex(r => r.id === id);
  const row = allData[idx];
  if (!row) return;
  if (!canWriteNow()) {
    showToast('⛔ 離線時禁止修改');
    return;
  }

  const oldValue = isStockCollected(row) ? '已領取' : '未領取';
  const newValue = value ? '已領取' : '未領取';
  const patch = {};
  rowPersons(row).forEach(p => { patch['collected_' + p] = value; });

  try {
    const res = await sbFetch(`${TABLE}?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify(patch)
    });
    if (!res.ok) throw new Error(await res.text());

    addHistory({ row, field: 'collected_stock', oldValue, newValue, source: '本機' });
    Object.assign(row, patch);
    saveCache(allData);
    renderTable();
    updateStats();
    if (currentRowId === id) updateModalPersons(id);
    showToast('✅ 已寫入資料庫');
  } catch(e) {
    console.error('write failed', e);
    addPendingWrite({
      type: 'collected', id, stock_code: row.stock_code || '', stock_name: row.stock_name || '',
      field: 'collected_stock', label: '領取狀態', oldValue, newValue, patch
    });
    setOnline(false);
    showToast('❌ 寫入失敗');
    openPendingModal();
  }
}

function togglePerson(e, id, person) {
  e.stopPropagation();
  const row = allData.find(r => r.id === id);
  if (!row) return;
  const newVal = !isStockCollected(row);
  updateCollectedForStock(id, newVal);
}

// ====== STATS ======
function updateStats() {
  const total = allData.length;
  const showing = displayData.length;
  const done = allData.filter(r => isStockCollected(r)).length;
  
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-showing').textContent = showing;
  document.getElementById('st-done').textContent = done;
  
  PERSONS.forEach(p => {
    const pending = allData.filter(r => getField(r,p,'has') && !isStockCollected(r)).length;
    document.getElementById(`st-${p}`).textContent = pending;
  });
}

// ====== MODAL ======
function openModal(id) {
  currentRowId = id;
  const row = allData.find(r => r.id === id);
  if (!row) return;
  document.getElementById('mTitle').textContent = `${row.stock_name||''} ${row.stock_code?'('+row.stock_code+')':''}`;
  document.getElementById('mSubtitle').textContent = `股東會：${row.agm_date||'-'} | 電投截止：${row.etd_last_day||'-'}`;
  document.getElementById('mGift').textContent = row.gift || '（未填寫）';
  document.getElementById('mPickup').textContent = row.pickup_time && row.pickup_time !== 'nan' ? row.pickup_time : '（未填寫）';
  document.getElementById('mRegistrar').innerHTML = `${row.registrar||'-'}<br><span style="font-size: 12px;color:var(--text3)">${row.registrar_address||''}</span>`;
  updateModalPersons(id);
  document.getElementById('modalOverlay').classList.add('open');
}

function updateModalPersons(id) {
  const row = allData.find(r => r.id === id);
  if (!row) return;
  const html = PERSONS.map(p => {
    const has = getField(row,p,'has');
    const col = isStockCollected(row);
    return `<div class="modal-person ${col?'checked':''} ${!has?'no-stock':''}" onclick="togglePerson(event,${id},'${p}')">
      <span class="modal-person-icon">${PERSON_ICONS[p]}</span>
      <span class="modal-person-name">${PERSON_LABELS[p]}</span>
      <span>${col?'✅':'⬜'}</span>
    </div>`;
  }).join('');
  document.getElementById('mPersons').innerHTML = html;
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}


// ====== EXPORT ======
function excelText(value) {
  return String(value ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

function exportExcel() {
  const rows = displayData && displayData.length ? displayData : allData;
  const headers = ['代碼','名稱','人名','人數','已領取','股東會','領取時間','紀念品','股代','股代地址'];
  const body = rows.map(row => {
    const people = rowPersons(row).map(p => PERSON_LABELS[p]).join('、');
    return [
      row.stock_code || '',
      row.stock_name || '',
      people,
      rowPersons(row).length,
      isStockCollected(row) ? '已領取' : '未領取',
      row.agm_date || '',
      row.pickup_time || '',
      row.gift || '',
      row.registrar || '',
      row.registrar_address || ''
    ];
  });
  const tableRows = [headers, ...body].map(cols =>
    '<tr>' + cols.map(v => `<td>${excelText(v)}</td>`).join('') + '</tr>'
  ).join('');
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><table border="1">${tableRows}</table></body></html>`;
  const blob = new Blob(['\ufeff', html], {type: 'application/vnd.ms-excel;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href = url;
  a.download = `股東紀念品_${date}.xls`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ 已匯出 Excel');
}

// ====== HISTORY MODAL ======
function fieldLabel(field) {
  const labels = {
    pickup_time: '領取時間',
    gift: '紀念品',
    registrar: '股代',
    registrar_address: '股代地址',
    collected_stock: '領取狀態'
  };
  if (field && field.startsWith('collected_')) return '領取狀態';
  if (field && field.startsWith('has_')) return '人名持有';
  return labels[field] || field || '欄位';
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch(e) { return []; }
}

function saveHistory(items) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, 300))); }
  catch(e) {}
}

function displayValue(value) {
  const text = String(value ?? '').trim();
  return text ? text : '（空白）';
}

function addHistory({ row, field, oldValue, newValue, source }) {
  if (String(oldValue ?? '') === String(newValue ?? '')) return;
  const item = {
    ts: new Date().toISOString(),
    source: source || '本機',
    id: row?.id || '',
    stock_code: row?.stock_code || '',
    stock_name: row?.stock_name || '',
    field,
    label: fieldLabel(field),
    oldValue: displayValue(oldValue),
    newValue: displayValue(newValue)
  };
  const history = loadHistory();
  history.unshift(item);
  saveHistory(history);
}

function addDiffHistory(oldRows, newRows, source) {
  const oldMap = new Map((oldRows || []).map(r => [String(r.id), r]));
  const fields = ['pickup_time', 'gift', 'registrar', 'registrar_address'];
  (newRows || []).forEach(newRow => {
    const oldRow = oldMap.get(String(newRow.id));
    if (!oldRow) return;
    fields.forEach(field => {
      const oldValue = oldRow[field] || '';
      const newValue = newRow[field] || '';
      if (String(oldValue) !== String(newValue)) {
        addHistory({ row: newRow, field, oldValue, newValue, source });
      }
    });
    const oldCollected = isStockCollected(oldRow) ? '已領取' : '未領取';
    const newCollected = isStockCollected(newRow) ? '已領取' : '未領取';
    if (oldCollected !== newCollected) {
      addHistory({ row: newRow, field: 'collected_stock', oldValue: oldCollected, newValue: newCollected, source });
    }
  });
}

function renderHistory() {
  const box = document.getElementById('historyContent');
  const history = loadHistory();
  if (!history.length) {
    box.innerHTML = '<div class="history-empty">目前沒有修改歷程</div>';
    return;
  }
  box.innerHTML = history.map(item => {
    const dt = new Date(item.ts);
    const time = isNaN(dt.getTime()) ? item.ts : dt.toLocaleString('zh-TW', { hour12: false });
    return `<div class="history-item">
      <div class="history-title">${escapeHtml(item.stock_code)} ${escapeHtml(item.stock_name)}</div>
      <div class="history-meta">${escapeHtml(time)}｜${escapeHtml(item.source)}｜${escapeHtml(item.label)}</div>
      <div class="history-change">${escapeHtml(item.oldValue)} → ${escapeHtml(item.newValue)}</div>
    </div>`;
  }).join('');
}

function openHistoryModal() {
  renderHistory();
  document.getElementById('historyModal').classList.add('open');
}
function closeHistoryModal() {
  document.getElementById('historyModal').classList.remove('open');
}
function clearHistory() {
  if (!confirm('確定要清除這台裝置上的修改歷程嗎？')) return;
  saveHistory([]);
  renderHistory();
  showToast('🧹 已清除修改歷程');
}

// ====== SYNC ======
async function syncData() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = '⏳';
  await fetchData();
  updatePendingButton();
  applyFilterSort();
  btn.textContent = '🔄';
  updatePendingButton();
  showToast(isOnline ? '✅ 資料已同步' : '⚠️ 無法連線，使用緩存');
  if (loadPendingWrites().length) openPendingModal();
}

let searchTimer;
document.getElementById('searchBox').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilterSort, 250);
});

// ====== INIT ======
async function init() {
  // Check network
  window.addEventListener('online', () => { setOnline(true); syncData(); if (loadPendingWrites().length) showToast('🔁 可按重新同步本機修改'); });
  window.addEventListener('offline', () => setOnline(false));
  
  await fetchData();
  updatePendingButton();
  applyFilterSort();
  
  document.getElementById('loading').style.display = 'none';
  document.getElementById('tableWrap').style.display = 'block';
  
  setupRealtime();
}

init();
