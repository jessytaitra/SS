<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📦 股東紀念品管理系統</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3354;
    --accent: #6c8dfa;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', 'PingFang TC', sans-serif; font-size: 14px; min-height: 100vh; }
  
  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.5); }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .header-top h1 { font-size: 17px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); margin-left: auto; flex-shrink: 0; }
  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  
  /* Controls */
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 150px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }
  .btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #5a7df0; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-outline.active { border-color: var(--accent); color: var(--accent); background: rgba(108,141,250,.1); }
  
  /* Filter bar */
  .filter-bar { padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text2); white-space: nowrap; transition: all .15s; }
  .filter-chip:hover, .filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(108,141,250,.12); }
  .filter-chip.person-chip { border-color: var(--accent2); color: var(--accent2); }
  .filter-chip.person-chip.active { background: rgba(167,139,250,.15); }
  
  /* Stats bar */
  .stats-bar { padding: 8px 16px; display: flex; gap: 12px; overflow-x: auto; background: var(--surface2); border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-item { display: flex; flex-direction: column; align-items: center; min-width: fit-content; }
  .stat-num { font-size: 18px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--text3); white-space: nowrap; }
  .stat-sep { width: 1px; background: var(--border); flex-shrink: 0; }
  
  /* Table container */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  th { background: var(--surface); color: var(--text2); font-size: 11px; font-weight: 600; padding: 10px 8px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); white-space: nowrap; user-select: none; cursor: pointer; }
  th:hover { color: var(--accent); }
  th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  td { padding: 8px 8px; border-bottom: 1px solid rgba(46,51,84,.5); vertical-align: middle; }
  tr:hover td { background: rgba(108,141,250,.05); }
  
  /* Person checkboxes */
  .person-cells { display: flex; gap: 4px; }
  .p-check { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; transition: all .15s; border: 1.5px solid var(--border); background: var(--surface2); flex-shrink: 0; }
  .p-check:hover { border-color: var(--green); }
  .p-check.checked { background: rgba(52,211,153,.15); border-color: var(--green); }
  .p-check.has-stock { border-color: var(--accent2); }
  .p-check.checked.has-stock { background: rgba(52,211,153,.2); border-color: var(--green); }
  .p-check.no-stock { opacity: .2; cursor: default; }
  
  /* Badges */
  .stock-code { font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: var(--accent2); background: rgba(167,139,250,.1); padding: 2px 6px; border-radius: 4px; }
  .stock-name { font-weight: 600; font-size: 13px; }
  .gift-text { font-size: 12px; color: var(--text2); max-width: 200px; }
  .date-text { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .pickup-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(251,191,36,.12); color: var(--yellow); border: 1px solid rgba(251,191,36,.3); white-space: nowrap; }
  .holders-badge { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .holders-6 { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.3); }
  .holders-5 { background: rgba(251,191,36,.12); color: var(--yellow); border: 1px solid rgba(251,191,36,.3); }
  .holders-low { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
  
  /* Registrar */
  .registrar-text { font-size: 11px; color: var(--text3); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  /* Progress */
  .progress-cell { min-width: 80px; }
  .progress-bar { height: 4px; border-radius: 2px; background: var(--surface2); overflow: hidden; margin-top: 3px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }
  .progress-text { font-size: 10px; color: var(--text3); }
  
  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: flex-end; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 16px 32px; width: 100%; max-height: 85vh; overflow-y: auto; animation: slideUp .25s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .modal-subtitle { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
  .modal-section { margin-bottom: 14px; }
  .modal-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .modal-value { font-size: 13px; color: var(--text); }
  .modal-persons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .modal-person { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 8px; background: var(--surface2); border: 1.5px solid var(--border); cursor: pointer; transition: all .15s; }
  .modal-person.checked { border-color: var(--green); background: rgba(52,211,153,.1); }
  .modal-person.no-stock { opacity: .3; cursor: default; pointer-events: none; }
  .modal-person-name { font-size: 13px; font-weight: 600; }
  .modal-person-icon { font-size: 16px; }
  
  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 13px; z-index: 300; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  
  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  
  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  
  /* Offline banner */
  .offline-banner { background: rgba(248,113,113,.15); border-bottom: 1px solid rgba(248,113,113,.3); padding: 8px 16px; text-align: center; font-size: 12px; color: var(--red); display: none; }
  .offline-banner.show { display: block; }
  
  /* SQL Modal */
  .sql-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 300; overflow-y: auto; padding: 20px 16px; }
  .sql-modal.open { display: block; }
  .sql-box { background: var(--surface); border-radius: var(--radius); padding: 16px; max-width: 700px; margin: 0 auto; }
  .sql-box h2 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 10px; overflow-x: auto; color: var(--text2); line-height: 1.6; }
  .sql-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 12px; color: var(--text); cursor: pointer; margin-top: 12px; width: 100%; }
  
  /* Person label colors */
  .p-guan { color: #60a5fa; }
  .p-mi { color: #f472b6; }
  .p-jie { color: #a78bfa; }
  .p-jing { color: #34d399; }
  .p-sheng { color: #fb923c; }
  .p-ba { color: #facc15; }
</style>
</head>

<div class="offline-banner" id="offlineBanner">📵 離線模式 — 使用本機緩存資料（更改將在重新連線後同步）</div>

    <button class="btn btn-outline" id="syncBtn" onclick="syncData()">🔄</button>

</div>

</div>

<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="table-wrap" id="tableWrap" style="display:none">
  <table id="mainTable">

        <th onclick="sortBy('stock_name')">名稱</th>

</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

    <div class="modal-title" id="mTitle"></div>
    <div class="modal-subtitle" id="mSubtitle"></div>
    <div class="modal-section">

    </div>

      <div class="modal-persons" id="mPersons"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// ====== STATE ======
let allData = [];
let displayData = [];
let currentFilter = 'all';
let sortCol = null;
let sortDir = 1;
let isOnline = false;
let currentRowId = null;
let realtimeChannel = null;

// ====== SUPABASE API ======
async function sbFetch(path, opts = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
    ...opts.headers
  };
  return fetch(url, { ...opts, headers });
}

async function fetchData() {
  try {
    const res = await sbFetch(`${TABLE}?select=*&order=id.asc&limit=1000`);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (data && data.length > 0) {
      allData = data;
      saveCache(data);
      setOnline(true);
      return data;
    }
    // table empty — seed it
    await seedData();
    return allData;
  } catch(e) {
    console.warn('Supabase unavailable, using cache', e);
    setOnline(false);
    const cached = loadCache();
    if (cached) { allData = cached; return cached; }
    allData = SEED_DATA.map(r => ({...r, collected_guan:false, collected_mi:false, collected_jie:false, collected_jing:false, collected_sheng:false, collected_ba:false}));
    return allData;
  }
}

async function seedData() {
  try {
    const rows = SEED_DATA.map(r => ({
      id: r.id,
      stock_code: r.stock_code,
      stock_name: r.stock_name,
      has_guan: r.guan, has_mi: r.mi, has_jie: r.jie,
      has_jing: r.jing, has_sheng: r.sheng, has_ba: r.ba,
      holders: r.holders,
      etd_last_day: r.etd_last_day,
      agm_date: r.agm_date,
      pickup_time: r.pickup_time,
      registrar: r.registrar,
      registrar_address: r.registrar_address,
      gift: r.gift,
      collected_guan: false, collected_mi: false, collected_jie: false,
      collected_jing: false, collected_sheng: false, collected_ba: false
    }));
    const batchSize = 50;
    for (let i=0; i<rows.length; i+=batchSize) {
      const batch = rows.slice(i, i+batchSize);
      await sbFetch(TABLE, { method:'POST', body: JSON.stringify(batch) });
    }
    // re-fetch
    const res = await sbFetch(`${TABLE}?select=*&order=id.asc&limit=1000`);
    const data = await res.json();
    allData = data;
    saveCache(data);
  } catch(e) { console.error('seed failed', e); }
}

async function updateRecord(id, field, value) {
  const patch = {};
  patch[field] = value;
  // optimistic update
  const idx = allData.findIndex(r => r.id === id);
  if (idx >= 0) allData[idx][field] = value;
  saveCache(allData);
  renderTable();
  updateStats();
  
  if (!isOnline) { showToast('⚠️ 離線：變更已暫存'); return; }
  
  try {
    const res = await sbFetch(`${TABLE}?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify(patch)
    });
    if (!res.ok) throw new Error('patch failed');
    showToast('✅ 已同步更新');
  } catch(e) {
    showToast('⚠️ 同步失敗，已暫存本機');
    setOnline(false);
  }
}

// ====== REALTIME ======
function setupRealtime() {
  if (typeof WebSocket === 'undefined') return;
  // Simple polling fallback for realtime
  setInterval(async () => {
    if (!isOnline) return;
    try {
      const res = await sbFetch(`${TABLE}?select=*&order=id.asc&limit=1000`);
      if (!res.ok) return;
      const data = await res.json();
      const newHash = JSON.stringify(data.map(r=>({id:r.id,cg:r.collected_guan,cm:r.collected_mi,cj:r.collected_jie,ck:r.collected_jing,cs:r.collected_sheng,cb:r.collected_ba})));
      const oldHash = JSON.stringify(allData.map(r=>({id:r.id,cg:r.collected_guan,cm:r.collected_mi,cj:r.collected_jie,ck:r.collected_jing,cs:r.collected_sheng,cb:r.collected_ba})));
      if (newHash !== oldHash) {
        allData = data;
        saveCache(data);
        renderTable();
        updateStats();
      }
    } catch(e) {}
  }, 8000);
}

// ====== CACHE ======
function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts: Date.now(), data})); } catch(e){}
}
function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const {data} = JSON.parse(raw);
    return data;
  } catch(e) { return null; }
}

// ====== UI HELPERS ======
function setOnline(v) {
  isOnline = v;
  document.getElementById('statusDot').className = 'status-dot' + (v ? ' online' : '');
  document.getElementById('offlineBanner').className = 'offline-banner' + (v ? '' : ' show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function getField(row, person, type) {
  if (type === 'has') return row['has_' + person] || row[person] || false;
  return row['collected_' + person] || false;
}

// ====== FILTER / SORT ======
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilterSort();
}

function applyFilterSort() {
  let data = [...allData];
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  
  if (q) {
    data = data.filter(r =>
      (r.stock_name||'').toLowerCase().includes(q) ||
      (r.stock_code||'').toLowerCase().includes(q) ||
      (r.gift||'').toLowerCase().includes(q) ||
      (r.registrar||'').toLowerCase().includes(q)
    );
  }
  
  if (currentFilter === 'pending') {
    data = data.filter(r => PERSONS.some(p => getField(r,p,'has') && !getField(r,p,'col')));
  } else if (currentFilter === 'done') {
    data = data.filter(r => PERSONS.every(p => !getField(r,p,'has') || getField(r,p,'col')));
  } else if (currentFilter === 'pickup') {
    data = data.filter(r => r.pickup_time && r.pickup_time.trim());
  } else if (PERSONS.includes(currentFilter)) {
    const p = currentFilter;
    data = data.filter(r => getField(r,p,'has'));
  }
  
  if (sortCol) {
    data.sort((a,b) => {
      const va = a[sortCol]||'', vb = b[sortCol]||'';
      if (typeof va === 'number') return (va-vb)*sortDir;
      return String(va).localeCompare(String(vb),'zh-TW') * sortDir;
    });
  }
  
  displayData = data;
  renderTable();
  updateStats();
}

function sortBy(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => th.className = '');
  event.target.className = sortDir === 1 ? 'sort-asc' : 'sort-desc';
  applyFilterSort();
}

// ====== RENDER ======
function renderTable() {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  
  if (displayData.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  const html = displayData.map(row => {
    const allDone = PERSONS.every(p => !getField(row,p,'has') || getField(row,p,'col'));
    const rowClass = allDone ? 'style="opacity:.6"' : '';
    
    const persons = PERSONS.map(p => {
      const has = getField(row,p,'has');
      const col = getField(row,p,'col');
      if (!has) return `<div class="p-check no-stock" title="${PERSON_LABELS[p]}">·</div>`;
      return `<div class="p-check has-stock ${col?'checked':''}" 
        onclick="togglePerson(event,${row.id},'${p}')"
        title="${PERSON_LABELS[p]}">${col?'✓':PERSON_ICONS[p]}</div>`;
    }).join('');
    
    const totalHas = PERSONS.filter(p=>getField(row,p,'has')).length;
    const totalCol = PERSONS.filter(p=>getField(row,p,'has')&&getField(row,p,'col')).length;
    const pct = totalHas > 0 ? Math.round(totalCol/totalHas*100) : 0;
    const holderClass = row.holders >= 6 ? 'holders-6' : row.holders >= 5 ? 'holders-5' : 'holders-low';
    
    const pickup = row.pickup_time && row.pickup_time.trim() && row.pickup_time !== 'nan' 
      ? `<span class="pickup-badge">${row.pickup_time}</span>` : '-';
    
    const gift = (row.gift && row.gift !== 'nan' && row.gift.trim())
      ? `<div class="gift-text" title="${row.gift}">${row.gift.length>30?row.gift.slice(0,30)+'…':row.gift}</div>` 
      : '<span style="color:var(--text3)">-</span>';
    
    return `<tr ${rowClass} onclick="openModal(${row.id})" style="cursor:pointer">
      <td><span class="stock-code">${row.stock_code||'-'}</span></td>
      <td><div class="stock-name">${row.stock_name||''}</div></td>
      <td onclick="event.stopPropagation()"><div class="person-cells">${persons}</div>
        <div class="progress-cell"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'var(--green)':pct>50?'var(--yellow)':'var(--accent)'}"></div></div>
        <div class="progress-text">${totalCol}/${totalHas}</div></div>
      </td>
      <td><span class="holders-badge ${holderClass}">${row.holders||0}</span></td>
      <td><div class="date-text">${row.agm_date||'-'}</div></td>
      <td>${pickup}</td>
      <td>${gift}</td>
      <td><div class="registrar-text" title="${row.registrar||''}">${row.registrar||'-'}</div></td>
    </tr>`;
  }).join('');
  
  tbody.innerHTML = html;
}

function togglePerson(e, id, person) {
  e.stopPropagation();
  const row = allData.find(r => r.id === id);
  if (!row) return;
  const field = 'collected_' + person;
  const newVal = !getField(row, person, 'col');
  updateRecord(id, field, newVal);
  // Update modal if open
  if (currentRowId === id) updateModalPersons(id);
}

// ====== STATS ======
function updateStats() {
  const total = allData.length;
  const showing = displayData.length;
  const done = allData.filter(r => PERSONS.every(p => !getField(r,p,'has') || getField(r,p,'col'))).length;
  
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-showing').textContent = showing;
  document.getElementById('st-done').textContent = done;
  
  PERSONS.forEach(p => {
    const pending = allData.filter(r => getField(r,p,'has') && !getField(r,p,'col')).length;
    document.getElementById(`st-${p}`).textContent = pending;
  });
}

// ====== MODAL ======
function openModal(id) {
  currentRowId = id;
  const row = allData.find(r => r.id === id);
  if (!row) return;
  document.getElementById('mTitle').textContent = `${row.stock_name||''} ${row.stock_code?'('+row.stock_code+')':''}`;
  document.getElementById('mSubtitle').textContent = `股東會：${row.agm_date||'-'} | 電投截止：${row.etd_last_day||'-'}`;
  document.getElementById('mGift').textContent = row.gift || '（未填寫）';
  document.getElementById('mPickup').textContent = row.pickup_time && row.pickup_time !== 'nan' ? row.pickup_time : '（未填寫）';
  document.getElementById('mRegistrar').innerHTML = `${row.registrar||'-'}<br><span style="font-size:11px;color:var(--text3)">${row.registrar_address||''}</span>`;
  updateModalPersons(id);
  document.getElementById('modalOverlay').classList.add('open');
}

function updateModalPersons(id) {
  const row = allData.find(r => r.id === id);
  if (!row) return;
  const html = PERSONS.map(p => {
    const has = getField(row,p,'has');
    const col = getField(row,p,'col');
    return `<div class="modal-person ${col?'checked':''} ${!has?'no-stock':''}" onclick="togglePerson(event,${id},'${p}')">
      <span class="modal-person-icon">${PERSON_ICONS[p]}</span>
      <span class="modal-person-name">${PERSON_LABELS[p]}</span>
      <span>${col?'✅':'⬜'}</span>
    </div>`;
  }).join('');
  document.getElementById('mPersons').innerHTML = html;
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

async function syncData() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = '⏳';
  await fetchData();
  applyFilterSort();
  btn.textContent = '🔄';
  showToast(isOnline ? '✅ 資料已同步' : '⚠️ 無法連線，使用緩存');

let searchTimer;
document.getElementById('searchBox').addEventListener('input', () => {
  clearTimeout(searchTimer);

});

// ====== INIT ======
async function init() {
  // Check network
  window.addEventListener('online', () => { setOnline(true); syncData(); });

  await fetchData();
  applyFilterSort();
  
  document.getElementById('loading').style.display = 'none';
  document.getElementById('tableWrap').style.display = 'block';

}

init();
